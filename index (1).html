<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сказочная карта России</title>
  <style>
    .map-container {
      position: relative;
      max-width: 100%;
      overflow: hidden;
    }
    .map-img {
      width: 100%;
      height: auto;
      display: block;
    }
    .hotspot {
      position: absolute;
      border: 2px solid rgba(255,255,255,0.6);
      transition: all 0.2s;
      cursor: pointer;
    }
    .hotspot:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }
    .tooltip {
      position: absolute;
      background: #fff;
      color: #000;
      padding: 6px 10px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }
    .hotspot:hover .tooltip {
      opacity: 1;
    }
  </style>
</head>
<body>

<div class="map-container">
  <!-- Замените src на вашу карту России -->
  <img src="https://detsad-shop.ru/images/detailed/115/11__1__7gt5-s2.JPG" alt="Карта России" class="map-img">

  <!-- Пример области для одного народа/региона -->
  <a href="https://vkvideo.ru/video51713450_456239198?pl=51713450_-4" class="hotspot" style="top: 57%; left: 3%; width: 35px; height: 10px;">
    <span class="tooltip">Сказки народов Севера</span>
  </a>

  <!-- Добавьте столько областей, сколько нужно -->
  <a href="ССЫЛКА_НА_ВИДЕО_СКАЗКИ_2" class="hotspot" style="top: 50%; left: 45%; width: 40px; height: 40px;">
    <span class="tooltip">Уральские сказки</span>
  </a>

  <a href="ССЫЛКА_НА_ВИДЕО_СКАЗКИ_3" class="hotspot" style="top: 70%; left: 60%; width: 40px; height: 40px;">
    <span class="tooltip">Дальневосточные сказки</span>
  </a>
</div>

</body>
</html>
